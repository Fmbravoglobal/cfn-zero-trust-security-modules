# Checkov configuration file
# Suppressed checks with documented rationale for demo/portfolio environment.
# Mirrors the skip_check pattern used across Fmbravoglobal Terraform repositories.
# Author: Oluwafemi Alabi Okunlola | github.com/Fmbravoglobal

framework:
  - cloudformation

quiet: true
compact: true

skip-check:
  # Lambda VPC placement — not required for demo/portfolio scope.
  # Production deployments would place Lambda inside VPC with private subnets.
  - CKV_AWS_117

  # Lambda Dead Letter Queue — ZT engine uses SNS alerting for failure notification.
  # Rotation Lambda has DLQ configured. Threat processor uses EventBridge retry policy.
  - CKV_AWS_116

  # Lambda environment variable encryption — env vars are protected via KMS CMK
  # encryption at rest. No plaintext secrets stored in environment variables.
  - CKV_AWS_173

  # CloudWatch Log Group KMS encryption — Log Groups are encrypted at the
  # account level via KMS CMK. Explicit per-group KMS not required for demo scope.
  - CKV_AWS_158

  # API Gateway access logging — access logging configured via stage MethodSettings.
  # LoggingLevel set to INFO on all methods in the stage configuration.
  - CKV_AWS_76

  # API Gateway caching — caching not required for policy evaluation demo endpoint.
  # Production deployments would enable caching with appropriate TTL settings.
  - CKV_AWS_120

  # IAM write access constraints — permission boundary enforces hard privilege
  # ceiling on all roles. No role can exceed boundary regardless of attached policies.
  - CKV_AWS_111

  # IAM data exfiltration — exfiltration controls enforced via permission boundaries
  # and least-privilege scoped policies with explicit resource ARN constraints.
  - CKV_AWS_108

  # S3 cross-region replication — addressed via EnableReplication parameter.
  # Replication module handles cross-region configuration separately.
  - CKV_AWS_144

  # Lambda code signing — not required for demo/portfolio environment.
  # Production deployments would enforce code signing policies.
  - CKV_AWS_272

  # S3 access logging — access logging configured via LoggingConfiguration
  # property pointing to dedicated log bucket in the secure-s3 module.
  - CKV_AWS_18
