AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Secrets Rotation Automation Module — Zero-downtime automated credential
  rotation using Secrets Manager + Lambda. KMS CMK encryption, SQS DLQ,
  X-Ray tracing, SNS alerting, and 30-day rotation enforcement.
  Compliance: NIST 800-53 (IA-5, SC-28, AU-2), CIS AWS 1.x, PCI-DSS Req 8
  Author: Oluwafemi Alabi Okunlola | github.com/Fmbravoglobal

# -------------------------------------------------------------------
# Parameters
# -------------------------------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: fmbravoglobal-secrets-rotation

  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
    Default: dev

  AlertEmail:
    Type: String
    Default: security-alerts@example.com
    Description: Email for rotation success/failure notifications

  RotationIntervalDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 365
    Description: Automatic secret rotation interval in days — NIST IA-5

  LambdaReservedConcurrency:
    Type: Number
    Default: 10
    Description: Reserved concurrent executions for rotation Lambda

  SecretRecoveryWindowDays:
    Type: Number
    Default: 7
    MinValue: 7
    MaxValue: 30
    Description: Recovery window before secret is permanently deleted

  LambdaS3Bucket:
    Type: String
    Default: my-lambda-deployments
    Description: S3 bucket containing the Lambda deployment package

  LambdaS3Key:
    Type: String
    Default: rotation_lambda.zip
    Description: S3 key for the Lambda deployment package

# -------------------------------------------------------------------
# Resources
# -------------------------------------------------------------------
Resources:

  # ── KMS CMK for Secrets ───────────────────────────────────────────
  SecretsKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "CMK for ${ProjectName} secrets encryption — ${Environment}"
      EnableKeyRotation: true
      PendingWindowInDays: 30
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableRootPermissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: AllowSecretsManagerUse
            Effect: Allow
            Principal:
              Service: secretsmanager.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
              - kms:DescribeKey
            Resource: "*"
          - Sid: AllowLambdaUse
            Effect: Allow
            Principal:
              AWS: !GetAtt RotationLambdaRole.Arn
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
              - kms:DescribeKey
            Resource: "*"
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: SecretsEncryption

  SecretsKMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${ProjectName}-secrets-${Environment}"
      TargetKeyId: !Ref SecretsKMSKey

  # ── SQS Dead Letter Queue ─────────────────────────────────────────
  RotationDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ProjectName}-rotation-dlq-${Environment}"
      KmsMasterKeyId: !Ref SecretsKMSKey
      MessageRetentionPeriod: 1209600    # 14 days
      VisibilityTimeout: 300
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Purpose
          Value: RotationDLQ

  # ── SNS Topic for Rotation Alerts ────────────────────────────────
  RotationAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${ProjectName}-rotation-alerts-${Environment}"
      KmsMasterKeyId: !Ref SecretsKMSKey
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ── Secrets Manager Secret ────────────────────────────────────────
  DBCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ProjectName}/db-credentials/${Environment}"
      Description: !Sub "Database credentials with auto-rotation — ${Environment}"
      KmsKeyId: !Ref SecretsKMSKey
      SecretString: !Sub |
        {
          "username": "dbadmin",
          "password": "REPLACE_ON_FIRST_ROTATION",
          "engine": "mysql",
          "host": "REPLACE_WITH_ENDPOINT",
          "port": 3306,
          "dbname": "${ProjectName}-db"
        }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: AutoRotation
          Value: "true"

  # ── Lambda Execution Role ─────────────────────────────────────────
  RotationLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-rotation-lambda-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RotationLambdaPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AllowSecretsManagerRotation
                Effect: Allow
                Action:
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:UpdateSecretVersionStage
                  - secretsmanager:GetRandomPassword
                Resource: !Ref DBCredentialsSecret
              - Sid: AllowKMSUse
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                  - kms:DescribeKey
                Resource: !GetAtt SecretsKMSKey.Arn
              - Sid: AllowSNSPublish
                Effect: Allow
                Action: sns:Publish
                Resource: !Ref RotationAlertTopic
              - Sid: AllowSQSDLQ
                Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt RotationDLQ.Arn
              - Sid: AllowCloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}*"
              - Sid: AllowXRay
                Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: "*"
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: LeastPrivilege
          Value: "true"

  # ── Lambda Log Group (pre-create for retention control) ───────────
  RotationLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ProjectName}-rotation-${Environment}"
      RetentionInDays: 90
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ── Rotation Lambda Function ──────────────────────────────────────
  RotationLambdaFunction:
    Type: AWS::Lambda::Function
    DependsOn: RotationLambdaLogGroup
    Properties:
      FunctionName: !Sub "${ProjectName}-rotation-${Environment}"
      Description: Automated secrets rotation — zero-downtime 4-step rotation lifecycle
      Runtime: python3.11
      Handler: app.main.lambda_handler
      Role: !GetAtt RotationLambdaRole.Arn
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref LambdaS3Key
      Timeout: 30
      MemorySize: 256
      ReservedConcurrentExecutions: !Ref LambdaReservedConcurrency
      KmsKeyArn: !GetAtt SecretsKMSKey.Arn
      DeadLetterConfig:
        TargetArn: !GetAtt RotationDLQ.Arn
      TracingConfig:
        Mode: Active                          # X-Ray tracing enabled
      Environment:
        Variables:
          SECRET_ARN: !Ref DBCredentialsSecret
          SNS_TOPIC_ARN: !Ref RotationAlertTopic
          ROTATION_INTERVAL_DAYS: !Sub "${RotationIntervalDays}"
          ENVIRONMENT: !Ref Environment
          LOG_LEVEL: INFO
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment
        XRayTracing: Active

  # ── Lambda Permission for Secrets Manager ─────────────────────────
  SecretsManagerLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RotationLambdaFunction
      Action: lambda:InvokeFunction
      Principal: secretsmanager.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  # ── Rotation Schedule ─────────────────────────────────────────────
  SecretRotationSchedule:
    Type: AWS::SecretsManager::RotationSchedule
    DependsOn: SecretsManagerLambdaPermission
    Properties:
      SecretId: !Ref DBCredentialsSecret
      RotationLambdaARN: !GetAtt RotationLambdaFunction.Arn
      RotationRules:
        AutomaticallyAfterDays: !Ref RotationIntervalDays

  # ── CloudWatch Alarm — Rotation Failure ───────────────────────────
  RotationFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-rotation-failure-${Environment}"
      AlarmDescription: Lambda rotation function errors — credential rotation may have failed
      MetricName: Errors
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref RotationLambdaFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref RotationAlertTopic
      TreatMissingData: notBreaching

# -------------------------------------------------------------------
# Outputs
# -------------------------------------------------------------------
Outputs:
  SecretArn:
    Description: ARN of the managed secret
    Value: !Ref DBCredentialsSecret
    Export:
      Name: !Sub "${ProjectName}-${Environment}-secret-arn"

  RotationLambdaArn:
    Description: ARN of the rotation Lambda function
    Value: !GetAtt RotationLambdaFunction.Arn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-rotation-lambda-arn"

  SNSTopicArn:
    Description: ARN of the rotation alert SNS topic
    Value: !Ref RotationAlertTopic
    Export:
      Name: !Sub "${ProjectName}-${Environment}-rotation-sns-arn"

  DLQArn:
    Description: ARN of the rotation Lambda dead letter queue
    Value: !GetAtt RotationDLQ.Arn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-dlq-arn"

  KMSKeyArn:
    Description: ARN of the secrets encryption KMS key
    Value: !GetAtt SecretsKMSKey.Arn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-secrets-kms-arn"
